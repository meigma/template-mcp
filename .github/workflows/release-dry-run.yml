# This workflow rehearses the release paths without uploading GitHub release
# assets or publishing/signing container images. It is intended for release PRs
# and manual checks before changing release automation.
#
# Keep the pull_request trigger broad so required check contexts still report
# on normal PRs. The jobs intentionally skip unless the PR head branch is a
# Release Please branch, which avoids spending runner time on routine changes.

name: Release Dry Run

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions: {}

jobs:
  binary-release-dry-run:
    name: Binary Release Dry Run
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.head_ref, 'release-please--') }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Create synthetic release tag
        env:
          DRY_RUN_TAG: v0.0.0-dryrun.${{ github.run_id }}.${{ github.run_attempt }}
        run: |
          git tag -f "$DRY_RUN_TAG"

      - name: Run GoReleaser without publishing
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GORELEASER_CURRENT_TAG: v0.0.0-dryrun.${{ github.run_id }}.${{ github.run_attempt }}

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.0"

      # Run the exact same staging/validation the real release runs, so the
      # rehearsal cannot drift from production. The script stages assets into
      # dist/release-assets and validates ghd.toml, the asset set, and checksums.
      - name: Stage and validate ghd release assets
        env:
          DRY_RUN_TAG: v0.0.0-dryrun.${{ github.run_id }}.${{ github.run_attempt }}
        run: uv run .github/scripts/stage_ghd_release_assets.py --tag "$DRY_RUN_TAG"

      - name: Smoke test dry-run binary
        run: |
          set -euo pipefail

          version="0.0.0-dryrun.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}"
          binary_name="template-mcp"
          host_os="$(go env GOHOSTOS)"
          host_arch="$(go env GOHOSTARCH)"
          bin="dist/release-assets/${binary_name}_${version}_${host_os}_${host_arch}"

          if [ ! -x "$bin" ]; then
            echo "failed to locate executable host binary artifact $bin" >&2
            find dist/release-assets -maxdepth 1 -type f -print | sort >&2
            exit 1
          fi

          output="$("$bin" --version)"
          printf '%s\n' "$output"

          case "$output" in
            "$binary_name "*"$version"*) ;;
            *) echo "unexpected version output: $output" >&2; exit 1 ;;
          esac

  # Rehearse the container build: build per-arch signed apks on native runners and
  # assemble the image with apko, WITHOUT pushing, signing, or attesting.
  melange-build-dry-run:
    name: Melange Build Dry Run (${{ matrix.arch }})
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.head_ref, 'release-please--') }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            apkdir: x86_64
          - arch: arm64
            runner: ubuntu-24.04-arm
            apkdir: aarch64
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.6.14
          cache: true

      - name: Resolve dry-run metadata
        id: dry-run
        env:
          DRY_RUN_VERSION: 0.0.0-dryrun.${{ github.run_id }}.${{ github.run_attempt }}
        run: |
          set -euo pipefail
          echo "version=${DRY_RUN_VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(git show -s --format=%cI HEAD)" >> "$GITHUB_OUTPUT"

      - name: Write melange vars file
        env:
          VERSION: ${{ steps.dry-run.outputs.version }}
          COMMIT: ${{ steps.dry-run.outputs.commit }}
          DATE: ${{ steps.dry-run.outputs.date }}
        run: |
          printf 'version: "%s"\ncommit: "%s"\ndate: "%s"\n' "$VERSION" "$COMMIT" "$DATE" > melange-vars.yaml

      - name: Generate ephemeral signing key
        run: melange keygen "melange-${{ matrix.arch }}.rsa"

      - name: Build signed apk
        run: |
          melange build melange.yaml \
            --arch ${{ matrix.arch }} \
            --runner docker \
            --signing-key "melange-${{ matrix.arch }}.rsa" \
            --source-dir . \
            --vars-file melange-vars.yaml

      - name: Upload apk and public key
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: apk-${{ matrix.arch }}
          path: |
            packages/${{ matrix.apkdir }}/**
            melange-${{ matrix.arch }}.rsa.pub
          if-no-files-found: error
          retention-days: 1

  container-image-dry-run:
    name: Container Image Dry Run
    needs:
      - melange-build-dry-run
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || startsWith(github.head_ref, 'release-please--')) }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Check melange dry-run result
        env:
          MELANGE_RESULT: ${{ needs.melange-build-dry-run.result }}
        run: |
          set -euo pipefail

          if [ "$MELANGE_RESULT" != "success" ]; then
            echo "melange dry-run result was $MELANGE_RESULT" >&2
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.6.14
          cache: true

      - name: Download per-arch apks and public keys
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: apk-*
          path: .
          merge-multiple: true

      - name: Assemble image and smoke test (no push)
        run: |
          set -euo pipefail

          apko build apko.yaml template-mcp:dry-run image.tar \
            --arch amd64 \
            --keyring-append ./melange-amd64.rsa.pub \
            --keyring-append ./melange-arm64.rsa.pub

          docker load < image.tar
          docker tag template-mcp:dry-run-amd64 template-mcp:dry-run

          docker run --rm template-mcp:dry-run --version
          docker run --rm template-mcp:dry-run --help
