# This workflow is tag-triggered by Release Please. It publishes binary release
# assets with GoReleaser, publishes the container image with Docker-native
# Actions, attests both artifact classes through GitHub-native attestations, and
# leaves draft publication as a human decision after inspection.

name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to release
        required: true
        type: string

permissions: {}

env:
  IMAGE_NAME: ghcr.io/meigma/template-mcp

jobs:
  resolve-release:
    name: Resolve Release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.release-tag.outputs.tag }}
      version: ${{ steps.release-tag.outputs.version }}
    steps:
      - name: Resolve release tag
        id: release-tag
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$DISPATCH_TAG"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Release tag must match vX.Y.Z or vX.Y.Z-prerelease: $tag" >&2
            exit 1
          fi

          version="${tag#v}"

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Wait for draft release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        run: |
          for attempt in $(seq 1 30); do
            if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json isDraft --jq '.isDraft' 2>/dev/null | grep -qx true; then
              exit 0
            fi
            echo "Draft release $RELEASE_TAG is not ready yet; retrying..."
            sleep 10
          done

          echo "Draft release $RELEASE_TAG was not found or is not a draft." >&2
          exit 1

  binary-release-assets:
    name: Binary Release Assets
    runs-on: ubuntu-24.04
    needs:
      - resolve-release
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Check out requested tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          RELEASE_TAG: ${{ needs.resolve-release.outputs.tag }}
        run: git checkout --detach "$RELEASE_TAG"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: .go-version
          cache: true

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Run GoReleaser without publishing
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.0"

      - name: Stage and validate ghd release assets
        env:
          RELEASE_TAG: ${{ needs.resolve-release.outputs.tag }}
        run: uv run .github/scripts/stage_ghd_release_assets.py --tag "$RELEASE_TAG"

      - name: Smoke test release binary
        env:
          RELEASE_TAG: ${{ needs.resolve-release.outputs.tag }}
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          binary_name="template-mcp"
          host_os="$(go env GOHOSTOS)"
          host_arch="$(go env GOHOSTARCH)"
          bin="dist/release-assets/${binary_name}_${version}_${host_os}_${host_arch}"

          if [ ! -x "$bin" ]; then
            echo "failed to locate executable host binary artifact $bin" >&2
            find dist/release-assets -maxdepth 1 -type f -print | sort >&2
            exit 1
          fi

          output="$("$bin" --version)"
          printf '%s\n' "$output"

          case "$output" in
            "$binary_name "*"$version"*) ;;
            *) echo "unexpected version output: $output" >&2; exit 1 ;;
          esac

      - name: Upload assets to draft release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.tag }}
        run: gh release upload "$RELEASE_TAG" dist/release-assets/* --clobber

      - name: Attest release checksums
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: dist/release-assets/checksums.txt

  container-image-build:
    name: Container Image Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs:
      - resolve-release
      - binary-release-assets
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Check out requested tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          RELEASE_TAG: ${{ needs.resolve-release.outputs.tag }}
        run: git checkout --detach "$RELEASE_TAG"

      - name: Resolve image metadata
        id: image
        env:
          RELEASE_TAG: ${{ needs.resolve-release.outputs.tag }}
          RELEASE_VERSION: ${{ needs.resolve-release.outputs.version }}
        run: |
          set -euo pipefail

          echo "name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(git show -s --format=%cI HEAD)" >> "$GITHUB_OUTPUT"
          echo "tag=${IMAGE_NAME}:${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ needs.resolve-release.outputs.tag }}
          labels: |
            org.opencontainers.image.title=template-mcp
            org.opencontainers.image.description=Meigma Go MCP server template
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.resolve-release.outputs.version }}
            org.opencontainers.image.revision=${{ steps.image.outputs.commit }}

      - name: Build and push container image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ steps.image.outputs.name }},push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=template-mcp-release-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=template-mcp-release-${{ matrix.arch }}
          build-args: |
            VERSION=${{ steps.image.outputs.version }}
            COMMIT=${{ steps.image.outputs.commit }}
            DATE=${{ steps.image.outputs.date }}
            SOURCE=https://github.com/${{ github.repository }}

      - name: Smoke test platform image
        env:
          IMAGE_REF: ${{ steps.image.outputs.name }}@${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail

          docker run --rm --platform "${{ matrix.platform }}" "$IMAGE_REF" --version
          docker run --rm --platform "${{ matrix.platform }}" "$IMAGE_REF" --help

      - name: Export platform digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail

          if [[ ! "$DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "unexpected image digest: $DIGEST" >&2
            exit 1
          fi

          mkdir -p /tmp/container-digests
          touch "/tmp/container-digests/${DIGEST#sha256:}"

      - name: Upload platform digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: container-digest-${{ matrix.arch }}
          path: /tmp/container-digests/*
          if-no-files-found: error
          retention-days: 1

  container-image-release:
    name: Container Image Release
    runs-on: ubuntu-24.04
    needs:
      - resolve-release
      - binary-release-assets
      - container-image-build
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    outputs:
      image-name: ${{ steps.manifest.outputs.name }}
      image-digest: ${{ steps.manifest.outputs.digest }}
    steps:
      - name: Resolve image metadata
        id: image
        env:
          RELEASE_TAG: ${{ needs.resolve-release.outputs.tag }}
        run: |
          set -euo pipefail

          echo "name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag=${IMAGE_NAME}:${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Download platform digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: container-digest-*
          path: /tmp/container-digests
          merge-multiple: true

      - name: Create multi-platform manifest
        id: manifest
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_TAG: ${{ steps.image.outputs.tag }}
        run: |
          set -euo pipefail

          mapfile -t digest_files < <(find /tmp/container-digests -maxdepth 1 -type f -print | sort)
          if [ "${#digest_files[@]}" -ne 2 ]; then
            echo "expected 2 platform digest files, found ${#digest_files[@]}" >&2
            printf '%s\n' "${digest_files[@]}" >&2
            exit 1
          fi

          refs=()
          for digest_file in "${digest_files[@]}"; do
            digest="$(basename "$digest_file")"
            if [[ ! "$digest" =~ ^[0-9a-f]{64}$ ]]; then
              echo "unexpected digest artifact name: $digest" >&2
              exit 1
            fi
            refs+=("${IMAGE_NAME}@sha256:${digest}")
          done

          docker buildx imagetools create --tag "$IMAGE_TAG" "${refs[@]}"

          manifest_json="$(docker buildx imagetools inspect "$IMAGE_TAG" --format '{{json .}}')"
          manifest_digest="$(jq -r '.manifest.digest' <<< "$manifest_json")"
          platforms="$(jq -r '
            [
              .manifest.manifests[]
              | select(.platform.os == "linux" and (.platform.architecture == "amd64" or .platform.architecture == "arm64"))
              | "\(.platform.os)/\(.platform.architecture)"
            ]
            | unique
            | join(",")
          ' <<< "$manifest_json")"

          if [[ ! "$manifest_digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "unexpected manifest digest: $manifest_digest" >&2
            exit 1
          fi

          if [ "$platforms" != "linux/amd64,linux/arm64" ]; then
            echo "unexpected manifest platforms: $platforms" >&2
            exit 1
          fi

          echo "name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "digest=${manifest_digest}" >> "$GITHUB_OUTPUT"

      - name: Smoke test release image
        run: |
          set -euo pipefail

          docker run --rm "${{ steps.manifest.outputs.tag }}" --version
          docker run --rm "${{ steps.manifest.outputs.tag }}" --help

      - name: Attest container image
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ steps.manifest.outputs.name }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true

  release-inspection-summary:
    name: Release Inspection Summary
    runs-on: ubuntu-24.04
    needs:
      - resolve-release
      - binary-release-assets
      - container-image-release
    permissions: {}
    steps:
      - name: Write inspection summary
        env:
          RELEASE_TAG: ${{ needs.resolve-release.outputs.tag }}
          RELEASE_VERSION: ${{ needs.resolve-release.outputs.version }}
          IMAGE_NAME: ${{ needs.container-image-release.outputs.image-name }}
          IMAGE_DIGEST: ${{ needs.container-image-release.outputs.image-digest }}
        run: |
          {
            echo "## Draft release ready for inspection"
            echo
            echo "Release: $RELEASE_TAG"
            echo
            echo "Binary verification commands:"
            echo
            echo '```sh'
            echo "gh release view $RELEASE_TAG --repo $GITHUB_REPOSITORY --json isDraft,assets"
            echo "asset=\"template-mcp_${RELEASE_VERSION}_\$(go env GOOS)_\$(go env GOARCH)\""
            echo "gh attestation verify \"dist/release-assets/\${asset}\" --repo \"$GITHUB_REPOSITORY\" --signer-workflow \"$GITHUB_REPOSITORY/.github/workflows/release.yml\" --source-ref \"refs/tags/$RELEASE_TAG\" --deny-self-hosted-runners"
            echo "ghd download \"$GITHUB_REPOSITORY/template-mcp@${RELEASE_VERSION}\" --output \"\$(mktemp -d)\""
            echo '```'
            echo
            echo "Container verification commands:"
            echo
            echo '```sh'
            echo "docker login ghcr.io"
            echo "docker pull \"${IMAGE_NAME}:${RELEASE_TAG}\""
            echo "docker run --rm \"${IMAGE_NAME}:${RELEASE_TAG}\" --version"
            echo "gh attestation verify \"oci://${IMAGE_NAME}@${IMAGE_DIGEST}\" --repo \"$GITHUB_REPOSITORY\" --signer-workflow \"$GITHUB_REPOSITORY/.github/workflows/release.yml\" --source-ref \"refs/tags/$RELEASE_TAG\" --deny-self-hosted-runners"
            echo '```'
            echo
            echo "Publish or reject the draft release manually after inspection. The container image is already available at ${IMAGE_NAME}:${RELEASE_TAG} because GHCR does not have a draft release state."
          } >> "$GITHUB_STEP_SUMMARY"
