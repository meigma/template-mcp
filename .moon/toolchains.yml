# Toolchains for the current template.
#
# Tool versions (Go, Python, uv, and the CLIs) are managed by mise (mise.toml +
# mise.lock); moon runs every task against `system` binaries that mise puts on
# PATH, so no language toolchain is declared here.

# Stable non-JavaScript toolchains in Moon v2.
# rust:
#   version: 'REPLACE_ME_RUST_VERSION'
#   components: ['clippy', 'rustfmt']

# JavaScript ecosystems can be added later if a generated project needs them.
# javascript:
#   packageManager: 'pnpm'
#   inferTasksFromScripts: true
