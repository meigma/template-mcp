# Shared Moon workspace configuration for the repository template.
# Keep the current projects explicit, then uncomment the discovery patterns
# below as the template grows into apps, packages, services, or tools.

projects:
  globs: []
  sources:
    root: '.'
    docs: 'docs'
    proxy: 'tools/proxy'

  # Uncomment to auto-discover more projects as the repository grows.
  # globs:
  #   - 'apps/*'
  #   - 'packages/*'
  #   - 'services/*'
  #   - 'tools/*'
  #   - 'crates/*'
  #   - 'cmd/*'
  #   - 'sdk/*'
  #
  # Uncomment if glob-discovered IDs are likely to collide.
  # globFormat: 'source-path'

defaultProject: 'root'

vcs:
  defaultBranch: 'master'
  provider: 'github'

pipeline:
  installDependencies: false

# Uncomment when you want Moon to aggregate project owners into CODEOWNERS.
# codeowners:
#   sync: true

# Uncomment after you start tagging and layering projects and want
# Moon to enforce project boundaries.
# constraints:
#   enforceLayerRelationships: true
#   tagRelationships:
#     frontend: ['shared-ui', 'typescript']
#     backend: ['data', 'shared-kernel']
